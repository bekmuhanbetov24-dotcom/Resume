    function renderOverview(p) {
      return `
        <div class="card hero" style="margin-bottom:1rem">
          <div class="hero-top"></div>
          <div class="hero-inner">
            ${avatarHtml(p)}
            <div>
              <div class="badges" style="margin-top:0;margin-bottom:.5rem">
                <span class="badge ok">${esc(p.status)}</span>
                <span class="badge">${esc(p.location)}</span>
              </div>
              <h1 style="color:#f8fafc;margin:0;font-size:1.75rem">${esc(p.nameShort)}</h1>
              <p class="role" style="font-weight:500">${esc(p.role)}</p>
              <p style="font-size:.875rem;color:#64748b;margin:.25rem 0 0">${esc(p.roleSub)}</p>
            </div>
          </div>
          <p class="summary" style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid rgba(100,116,139,.2)">${esc(p.summary)}</p>
          <div class="badges" style="margin-top:1rem">${p.highlights.map((h) => `<span class="badge">${esc(h)}</span>`).join("")}</div>
        </div>
        <div class="stats" style="margin-bottom:1rem">
          ${RESUME.stats.map((s) => `<div class="card stat-card"><p class="stat-val" style="color:#f1f5f9">${esc(s.value)}</p><p class="stat-label">${esc(s.label)}</p>${s.hint ? `<p class="stat-hint">${esc(s.hint)}</p>` : ""}</div>`).join("")}
        </div>
        <div class="card" style="margin-bottom:1rem;padding-top:1rem;padding-bottom:1rem"><div class="accent-line"></div><h2 style="margin-bottom:0">Публикации</h2><p style="font-size:.8125rem;color:#64748b;margin:.25rem 0 0">В СМИ и науке</p>${featuredHtml()}</div>
        <div class="card"><div class="accent-line"></div><h2>Образование</h2>
            ${RESUME.education.map((e) => `<p class="period" style="font-size:11px;color:#60a5fa">${esc(e.period)}</p><p style="font-weight:500;margin:.25rem 0;font-size:.875rem">${esc(e.title)}</p><p style="font-size:.75rem;color:#64748b;margin-bottom:.75rem">${esc(e.note)}</p>`).join("")}</div>`;
    }

    function renderSkills() {
      return `<div class="card"><div class="accent-line"></div><h2>Навыки</h2><div class="skills-grid">${skillsHtml()}</div></div>`;
    }

    function renderCertificates() {
      const slides = RESUME.certificates.map((c) =>
        `<div class="cert-carousel-slide"><img src="${esc(c.image)}" alt="${esc(c.title)}" draggable="false" /></div>`
      ).join("");
      return `
        <div class="accent-line"></div><h2>Сертификаты</h2>
        <p class="section-desc">Свайп влево / вправо</p>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="cert-carousel-viewport" id="cert-viewport">
            <div class="cert-carousel-track" id="cert-track">${slides}</div>
          </div>
          <div class="cert-caption" id="cert-caption"></div>
          <div class="cert-controls">
            <button type="button" class="cert-nav-btn" id="cert-prev" aria-label="Назад">←</button>
            <div class="cert-dots" id="cert-dots"></div>
            <button type="button" class="cert-nav-btn" id="cert-next" aria-label="Вперёд">→</button>
          </div>
        </div>
        ${RESUME.otherCredentials.length ? `<ul class="other-creds">${RESUME.otherCredentials.map((c) => `<li><span class="period" style="display:inline;margin-right:.5rem">${esc(c.year)}</span>${esc(c.title)}</li>`).join("")}</ul>` : ""}`;
    }

    function renderExperience() {
      return `<div class="card"><div class="accent-line"></div><h2>Опыт работы</h2>
        <ol class="timeline">${RESUME.experience.map((j) => `
          <li><p class="period">${esc(j.period)}</p><h3>${esc(j.role)}</h3><p class="company">${esc(j.company)}</p>
          <p class="desc">${esc(j.description)}</p><ul>${j.highlights.map((h) => `<li><span>→</span>${esc(h)}</li>`).join("")}</ul></li>`).join("")}
        </ol></div>`;
    }

    function renderContact(p) {
      return `<div class="card"><div class="accent-line"></div><h2>Контакты</h2>
        <div class="contact-grid">${RESUME.contact.map((c) => `
          <a class="contact-link" href="${esc(c.href)}" ${c.type !== "email" && c.type !== "phone" ? 'target="_blank" rel="noopener"' : ""}>
            <span class="contact-icon">${icons[c.type] || "↗"}</span>
            <div><p class="contact-type">${esc(c.type)}</p><p class="contact-label">${esc(c.label)}</p></div>
          </a>`).join("")}
        </div>
        <p class="footer-note">© ${new Date().getFullYear()} · ${esc(p.name)}</p></div>`;
    }

    function updateCertSlide() {
      const track = document.getElementById("cert-track");
      const caption = document.getElementById("cert-caption");
      const dots = document.getElementById("cert-dots");
      const prev = document.getElementById("cert-prev");
      const next = document.getElementById("cert-next");
      if (!track) return;
      const c = RESUME.certificates[certIndex];
      track.style.transform = `translateX(-${certIndex * 100}%)`;
      caption.innerHTML = `<p class="year">${esc(c.year)} · ${certIndex + 1} / ${RESUME.certificates.length}</p>
        <h3>${esc(c.title)}</h3><p class="issuer">${esc(c.issuer)}</p>${c.detail ? `<p class="issuer" style="font-size:.75rem;color:#64748b">${esc(c.detail)}</p>` : ""}`;
      dots.innerHTML = RESUME.certificates.map((_, i) =>
        `<button type="button" class="cert-dot${i === certIndex ? " active" : ""}" data-i="${i}" aria-label="Слайд ${i + 1}"></button>`
      ).join("");
      dots.querySelectorAll(".cert-dot").forEach((d) => {
        d.addEventListener("click", () => { certIndex = +d.dataset.i; updateCertSlide(); });
      });
      if (prev) prev.disabled = certIndex === 0;
      if (next) next.disabled = certIndex === RESUME.certificates.length - 1;
    }

    function bindCertCarousel() {
      const viewport = document.getElementById("cert-viewport");
      document.getElementById("cert-prev")?.addEventListener("click", () => { if (certIndex > 0) { certIndex--; updateCertSlide(); } });
      document.getElementById("cert-next")?.addEventListener("click", () => { if (certIndex < RESUME.certificates.length - 1) { certIndex++; updateCertSlide(); } });
      if (!viewport) return;
      viewport.addEventListener("touchstart", (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
      viewport.addEventListener("touchend", (e) => {
        const dx = touchStartX - e.changedTouches[0].clientX;
        if (dx > 50 && certIndex < RESUME.certificates.length - 1) { certIndex++; updateCertSlide(); }
        else if (dx < -50 && certIndex > 0) { certIndex--; updateCertSlide(); }
      }, { passive: true });
      updateCertSlide();
    }

    function showScreen(id) {
      activeScreen = id;
      document.querySelectorAll(".screen").forEach((s) => s.classList.toggle("active", s.dataset.screen === id));
      document.querySelectorAll(".nav-btn, .mob-nav button").forEach((b) => b.classList.toggle("active", b.dataset.id === id));
      window.scrollTo(0, 0);
      if (id === "certificates") bindCertCarousel();
    }

    function render() {
      const p = RESUME.profile;
      document.title = RESUME.meta.pageTitle;

      document.getElementById("sidebar").innerHTML = `
        <div><p class="sidebar-name">${esc(p.nameShort.split(" ")[0])}</p><p class="sidebar-role">Project Manager</p></div>
        <nav style="flex:1;margin-top:1.5rem">${RESUME.nav.map((n) => `<button type="button" class="nav-btn" data-id="${n.id}"><span class="nav-icon">${n.icon}</span>${esc(n.label)}</button>`).join("")}</nav>
        <div class="sidebar-status">${esc(p.status)}</div>`;

      document.getElementById("mob-nav").innerHTML = RESUME.nav.map((n) =>
        `<button type="button" data-id="${n.id}"><span class="nav-icon">${n.icon}</span>${esc(n.short)}</button>`
      ).join("");

      document.getElementById("app").innerHTML = `
        <div class="screen active" data-screen="overview">${renderOverview(p)}</div>
        <div class="screen" data-screen="skills">${renderSkills()}</div>
        <div class="screen" data-screen="certificates">${renderCertificates()}</div>
        <div class="screen" data-screen="experience">${renderExperience()}</div>
        <div class="screen" data-screen="contact">${renderContact(p)}</div>`;

      document.querySelectorAll("[data-id]").forEach((btn) => {
        btn.addEventListener("click", () => showScreen(btn.dataset.id));
      });
      showScreen(activeScreen);
    }

    render();
  </script>
</body>
</html>
